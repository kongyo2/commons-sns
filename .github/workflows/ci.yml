name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: jobs only need to read the checked-out code.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep wrangler non-interactive and quiet in CI.
  WRANGLER_SEND_METRICS: "false"

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      # Report every check independently instead of stopping at the first red.
      fail-fast: false
      matrix:
        include:
          - name: lint
            run: npm run lint:ci
          - name: format
            run: npm run format:check
          - name: typecheck
            run: npm run typecheck
          - name: build
            run: npm run build
          - name: migrations
            run: npm run db:migrate:local
          - name: test
            run: npm run test:coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.run }}

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      # 日本語UIのスクリーンショットが文字化けしないようCJKフォントを入れる。
      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
      - run: npm run db:migrate:local
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
